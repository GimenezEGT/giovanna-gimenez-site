<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640"
     role="img" aria-label="Ilustração de uma xícara, um caderno e uma planta sobre a mesa — placeholder da foto.">
  <defs>
    <linearGradient id="sFundo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F2EB"/>
      <stop offset="1" stop-color="#E8DDCF"/>
    </linearGradient>
    <radialGradient id="sHalo" cx="0.5" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fundo -->
  <rect width="480" height="640" fill="url(#sFundo)"/>
  <rect width="480" height="640" fill="url(#sHalo)"/>

  <!-- mesa -->
  <rect x="0" y="452" width="480" height="188" fill="#C9BEAA"/>
  <rect x="0" y="452" width="480" height="12" fill="#D9D6CF"/>

  <!-- caderno -->
  <g>
    <rect x="70" y="360" width="200" height="120" rx="10" fill="#6C7050"/>
    <rect x="70" y="360" width="200" height="120" rx="10" fill="#3D352D" opacity="0.10"/>
    <rect x="86" y="360" width="14" height="120" fill="#5B5F43"/>
    <!-- elástico -->
    <rect x="228" y="360" width="9" height="120" fill="#3D352D" opacity="0.55"/>
    <!-- páginas -->
    <rect x="76" y="470" width="188" height="10" rx="3" fill="#F6F2EB"/>
  </g>

  <!-- xícara + pires -->
  <g>
    <ellipse cx="330" cy="470" rx="78" ry="16" fill="#B7AD98"/>
    <path d="M286 432 h88 a10 10 0 0 1 10 10 v6 a44 44 0 0 1 -44 30 h-30 a44 44 0 0 1 -44 -30 v-6 a10 10 0 0 1 10 -10 z" fill="#EFE8DB" stroke="#3D352D" stroke-width="4"/>
    <path d="M384 440 a24 22 0 0 1 0 40 a30 26 0 0 0 0 -40 z" fill="#EFE8DB" stroke="#3D352D" stroke-width="4"/>
    <ellipse cx="330" cy="440" rx="42" ry="9" fill="#8A6E58" opacity="0.55"/>
    <!-- vapor -->
    <path d="M312 420 c 10 -12 -8 -22 2 -36" fill="none" stroke="#A7AE8C" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M344 420 c 10 -12 -8 -22 2 -36" fill="none" stroke="#A7AE8C" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- vasinho + planta -->
  <g>
    <path d="M150 452 l60 0 l-9 46 a22 22 0 0 1 -42 0 z" fill="#8A6E58"/>
    <path d="M180 452 C 165 416 160 388 172 360 C 190 388 194 420 186 452 Z" fill="#6C7050"/>
    <path d="M180 452 C 198 420 220 404 242 400 C 224 430 204 448 186 452 Z" fill="#A7AE8C"/>
    <path d="M180 452 C 162 424 138 414 118 412 C 142 438 162 448 178 452 Z" fill="#7E8664"/>
  </g>
</svg>
