<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" width="640" height="800"
     role="img" aria-label="Ilustração de uma janela com luz natural e uma planta — placeholder da foto.">
  <defs>
    <linearGradient id="hLuz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F2EB"/>
      <stop offset="0.55" stop-color="#E8DDCF"/>
      <stop offset="1" stop-color="#D9D6CF"/>
    </linearGradient>
    <linearGradient id="hVidro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1ECE1"/>
      <stop offset="1" stop-color="#C7CEB2"/>
    </linearGradient>
    <radialGradient id="hHalo" cx="0.5" cy="0.36" r="0.6">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fundo -->
  <rect width="640" height="800" fill="url(#hLuz)"/>

  <!-- janela -->
  <g>
    <rect x="150" y="96" width="340" height="470" rx="18" fill="#EFE8DB" stroke="#3D352D" stroke-width="6"/>
    <rect x="168" y="114" width="304" height="434" rx="10" fill="url(#hVidro)"/>
    <!-- caixilhos -->
    <rect x="316" y="114" width="8" height="434" fill="#EFE8DB"/>
    <rect x="168" y="327" width="304" height="8" fill="#EFE8DB"/>
    <!-- luz suave entrando -->
    <polygon points="200,120 300,120 250,540 150,540" fill="#FFFFFF" opacity="0.22"/>
    <polygon points="360,120 420,120 400,540 330,540" fill="#FFFFFF" opacity="0.14"/>
  </g>

  <!-- peitoril -->
  <rect x="120" y="566" width="400" height="30" rx="8" fill="#C9BEAA"/>
  <rect x="120" y="566" width="400" height="10" rx="5" fill="#E8DDCF"/>

  <!-- vaso + planta -->
  <g>
    <path d="M292 566 l56 0 l-8 66 a20 20 0 0 1 -40 0 z" fill="#8A6E58"/>
    <path d="M292 566 l56 0 l-3 22 l-50 0 z" fill="#3D352D" opacity="0.18"/>
    <!-- folhas -->
    <path d="M320 566 C 300 520 288 486 300 452 C 322 486 328 522 322 566 Z" fill="#6C7050"/>
    <path d="M320 566 C 342 522 366 500 392 492 C 372 528 350 552 326 566 Z" fill="#A7AE8C"/>
    <path d="M320 566 C 298 528 268 512 244 508 C 272 540 296 556 316 566 Z" fill="#7E8664"/>
    <path d="M320 560 C 318 520 322 484 336 456 C 340 492 334 528 324 560 Z" fill="#A7AE8C" opacity="0.85"/>
  </g>

  <!-- halo de luz por cima -->
  <rect width="640" height="800" fill="url(#hHalo)"/>
</svg>
